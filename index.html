<html lang="fr">

<style>

*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#071122;--bg2:#0a1a35;--bg3:#0d2040;--sidebar:#0a1a35;
--accent:#a78bfa;--accent2:#7c3aed;--accent3:#6d28d9;
--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
--border:#1e3a5f;--border2:#2d4a6f;--card:#0d2040;
--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--orange:#f97316;

--shadow:0 4px 24px rgba(0,0,0,0.4);

}
.light{--bg:#f0f2f8;--bg2:#e8ecf4;--bg3:#dde3ef;--sidebar:#fff;--accent:#534AB7;--accent2:#534AB7;--accent3:#3d369e;--text:#1e293b;--text2:#475569;--text3:#94a3b8;--border:#d1d9e6;--border2:#b8c4d8;--card:#fff;--shadow:0 4px 24px rgba(83,74,183,.08);}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

input,select,textarea{font-family:var(--font);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 13px;border-radius:var(--radius-sm);font-size:13px;width:100%;outline:none;transition:border .2s}

.light input,.light select,.light textarea{background:#f8faff}
button{font-family:var(--font);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
#app{display:flex;height:100vh;overflow:hidden}

.sb-user{margin:10px 10px 0;padding:10px 12px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;gap:10px}

.sb-nav{padding:10px;flex:1}

.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .12s;margin-bottom:1px;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}.nav-item.active{background:rgba(124,58,237,.15);color:var(--accent);border-color:rgba(124,58,237,.25)}

.sw{width:36px;height:20px;background:var(--border2);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--accent2)}.sw-k{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s}.sw.on .sw-k{transform:translateX(16px)}

.action-btn{padding:8px 14px;background:var(--accent2);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;cursor:pointer}

.notif-item{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;display:flex;align-items:flex-start;gap:8px}
.ndot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}

.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;border:none;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn-p{background:var(--accent2);color:#fff}.btn-p:hover{background:var(--accent3)}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-s:hover{border-color:var(--border2)}
.btn-d{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25)}.btn-d:hover{background:rgba(239,68,68,.2)}
.btn-ok{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.btn-sm{padding:5px 10px;font-size:11px}.btn-xs{padding:3px 8px;font-size:10px}
.btn-ico{padding:6px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer}.btn-ico:hover{border-color:var(--accent);color:var(--accent)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;transition:transform .15s}
.kpi:hover{transform:translateY(-2px)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gr::before{background:var(--green)}.kpi.bl::before{background:var(--blue)}.kpi.vi::before{background:var(--accent)}.kpi.rd::before{background:var(--red)}.kpi.or::before{background:var(--orange)}.kpi.ye::before{background:var(--yellow)}
.kpi-ico{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:18px}
.kpi-ico.gr{background:rgba(16,185,129,.15)}.kpi-ico.bl{background:rgba(59,130,246,.15)}.kpi-ico.vi{background:rgba(167,139,250,.15)}.kpi-ico.rd{background:rgba(239,68,68,.15)}.kpi-ico.or{background:rgba(249,115,22,.15)}.kpi-ico.ye{background:rgba(245,158,11,.15)}
.kpi-val{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:4px}
.kpi-label{font-size:12px;color:var(--text2);font-weight:600}.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}
.tw{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}

.tw-title{font-size:14px;font-weight:800}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;font-size:12px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.015)}
.b{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.b-gr{background:rgba(16,185,129,.15);color:var(--green)}.b-rd{background:rgba(239,68,68,.15);color:var(--red)}.b-ye{background:rgba(245,158,11,.15);color:var(--yellow)}.b-bl{background:rgba(59,130,246,.15);color:#3b82f6}.b-gy{background:var(--bg3);color:var(--text3)}.b-or{background:rgba(249,115,22,.15);color:var(--orange)}.b-vi{background:rgba(167,139,250,.15);color:var(--accent)}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.srch{position:relative;flex:1;min-width:180px}.srch input{padding-left:34px}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none}
.fsel{width:auto!important;min-width:130px}
.empty-st{text-align:center;padding:50px 20px;color:var(--text3)}.empty-st .ei{font-size:42px;margin-bottom:12px}.empty-st h3{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:6px}.empty-st p{font-size:12px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av-sm{width:30px;height:30px;font-size:11px}.av-md{width:38px;height:38px;font-size:13px}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.al-r{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.al-y{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fcd34d}
.al-b{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
.al-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.err-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;margin-top:10px;display:none}
.ok-msg{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;margin-top:10px;display:none}
.pg-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.pg-title{font-size:20px;font-weight:800;letter-spacing:-.5px}.pg-sub{font-size:12px;color:var(--text3);margin-top:2px}
.dr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px}
.dr:last-child{border-bottom:none}.dl{color:var(--text3);font-weight:600}.dv{color:var(--text);font-weight:700;text-align:right}

.chg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.ln-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 15% 50%,rgba(124,58,237,.2) 0%,transparent 55%),radial-gradient(ellipse at 85% 15%,rgba(59,130,246,.12) 0%,transparent 45%)}
.ln-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;width:100%;max-width:400px;position:relative;z-index:1;box-shadow:var(--shadow)}

.ln-logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent2),#a78bfa);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 10px}
.ln-logo h1{font-size:22px;font-weight:800;letter-spacing:-.5px}.ln-logo p{font-size:12px;color:var(--text3);margin-top:3px}

</div>

<script>
// =============================================

// =============================================
const SB_URL='https://qbhftwpkfocvijgoxkxq.supabase.co';
const SB_KEY='sb_publishable_GcZZ53Ah4VhRgtrbkDG8TA_RvT87dlk';
const sb=supabase.createClient(SB_URL,SB_KEY);

// =============================================
// UTILS
// =============================================
const $=id=>document.getElementById(id);
const uid=()=>'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const now=()=>new Date().toISOString();
const fd=d=>d?new Date(d).toLocaleDateString('fr-FR'):'—';
const fdt=d=>d?new Date(d).toLocaleString('fr-FR'):'—';
const fm=n=>new Intl.NumberFormat('fr-FR').format(n||0)+' FCFA';
const fn=n=>new Intl.NumberFormat('fr-FR').format(n||0);
const gv=id=>($(id)?.value||'').trim();
const gvr=id=>($(id)?.value||'');
function ini(n,p){return((p||'')[0]||(n||'')[0]||'?').toUpperCase()+((n||'')[0]||'').toUpperCase();}
function avc(s){const c=['#7c3aed','#3b82f6','#10b981','#f59e0b','#ef4444','#ec4899','#06b6d4','#84cc16'];let h=0;for(let ch of(s||''))h+=ch.charCodeAt(0);return c[h%c.length];}
function daysDiff(d){if(!d)return 9999;return Math.floor((new Date(d)-new Date())/(864e5));}
function avEl(name,prenom,color,size,logo){
  const bg=color||avc((prenom||'')+(name||''));
  const cls='av av-'+(size||'sm');
  if(logo)return`<div class="${cls}" style="background:${bg}"><img src="${logo}" alt=""></div>`;
  return`<div class="${cls}" style="background:${bg};color:#fff">${ini(name,prenom)}</div>`;
}
function readFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});}

let C={users:[],proprietaires:[],vehicules:[],conducteurs:[],affectations:[],versements:[],depenses:[],employes:[],activity:[]};

async function loadAll(){
  try{
    const [u,pr,ve,co,af,ver,dep,emp,act]=await Promise.all([
      sb.from('users').select('*'),
      sb.from('proprietaires').select('*'),
      sb.from('vehicules').select('*'),
      sb.from('conducteurs').select('*'),
      sb.from('affectations').select('*'),
      sb.from('versements').select('*'),
      sb.from('depenses').select('*'),
      sb.from('employes').select('*'),
      sb.from('activity').select('*').order('ts',{ascending:false}).limit(300),
    ]);
    C.users=u.data||[];C.proprietaires=pr.data||[];C.vehicules=ve.data||[];
    C.conducteurs=co.data||[];C.affectations=af.data||[];C.versements=ver.data||[];
    C.depenses=dep.data||[];C.employes=emp.data||[];C.activity=act.data||[];
  }catch(e){console.error('loadAll',e);}
}

async function dbIns(table,row){
  const {data,error}=await sb.from(table).insert([row]).select();
  if(error){console.error('ins',table,error);return null;}
  if(data?.[0])C[table]=[...(C[table]||[]),data[0]];
  return data?.[0];
}
async function dbUpd(table,id,upd){
  const {error}=await sb.from(table).update(upd).eq('id',id);
  if(error){console.error('upd',table,error);return false;}
  C[table]=C[table].map(r=>r.id===id?{...r,...upd}:r);
  return true;
}
async function dbDel(table,id){
  const {error}=await sb.from(table).delete().eq('id',id);
  if(error){console.error('del',table,error);return false;}
  C[table]=C[table].filter(r=>r.id!==id);
  return true;
}
async function addLog(action,detail){
  const row={id:uid(),user_id:CU?.id,action,detail,ts:now()};
  await sb.from('activity').insert([row]);
  C.activity.unshift(row);
}

let CU=null,isDark=true,notifOpen=false,curPage='dashboard',topActionFn=null;

async function doLogin(){
  const email=gv('ln-email'),pwd=gvr('ln-pwd');
  const err=$('ln-err');err.style.display='none';
  if(!email||!pwd){err.textContent='Email et mot de passe requis';err.style.display='block';return;}
  $('ln-btn').textContent='Connexion…';$('ln-btn').disabled=true;
  try{
    const {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
    if(error){err.textContent='Email ou mot de passe incorrect';err.style.display='block';return;}
    const {data:uData}=await sb.from('users').select('*').eq('auth_id',data.user.id).single();
    if(!uData){err.textContent='Profil introuvable.';err.style.display='block';return;}
    if(uData.actif===false){err.textContent='Compte suspendu.';err.style.display='block';return;}
    CU=uData;await loadAll();startApp();
  }catch(e){err.textContent='Erreur de connexion';err.style.display='block';}
  finally{$('ln-btn').textContent='Connexion →';$('ln-btn').disabled=false;}
}

async function doLogout(){
  await sb.auth.signOut();CU=null;
  $('app').style.display='none';$('login-page').style.display='flex';$('ln-pwd').value='';
}

function startApp(){
  $('login-page').style.display='none';$('app').style.display='flex';
  refreshUser();buildNav();navTo('dashboard');buildNotifs();
}

function getDocAlerts(){
  const res=[];
  for(const c of C.conducteurs){
    if(CU.role==='proprietaire'&&c.prop_id!==CU.id)continue;
    const ck=(lbl,date,url)=>{
      if(!url&&!date){res.push({t:'b',msg:`${c.prenom} ${c.nom}: ${lbl} manquant`});return;}
      if(date){const d=daysDiff(date);if(d<0)res.push({t:'r',msg:`${c.prenom} ${c.nom}: ${lbl} expiré`});else if(d<30)res.push({t:'y',msg:`${c.prenom} ${c.nom}: ${lbl} expire dans ${d}j`});}
    };
    ck('CNI',c.cni_exp,c.cni_url);ck('Permis',c.permis_exp,c.permis_url);
  }
  return res;
}

function drawLine(vers){
  const c=$('chart-line');if(!c)return;
  const ctx=c.getContext('2d');const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
  const N=30;const data=[];const td=new Date();
  for(let i=N-1;i>=0;i--){const d=new Date(td);d.setDate(d.getDate()-i);const s=d.toDateString();const t=vers.filter(v=>new Date(v.date).toDateString()===s&&v.statut==='valide').reduce((s,v)=>s+(v.montant||0),0);data.push({l:d.getDate()+'/'+(d.getMonth()+1),v:t});}
  const mx=Math.max(...data.map(d=>d.v),1);const pd={l:58,r:18,t:16,b:36};const gW=W-pd.l-pd.r,gH=H-pd.t-pd.b;
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pd.t+gH*(1-i/4);ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(pd.l+gW,y);ctx.stroke();ctx.fillStyle='rgba(148,163,184,.7)';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(fn(Math.round(mx*i/4/1000))+'k',pd.l-4,y+4);}
  if(data.some(d=>d.v>0)){ctx.beginPath();ctx.strokeStyle='#7c3aed';ctx.lineWidth=2.5;ctx.lineJoin='round';data.forEach((d,i)=>{const x=pd.l+gW*i/(N-1);const y=pd.t+gH*(1-d.v/mx);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();}
  else{ctx.fillStyle='rgba(148,163,184,.4)';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('Aucune donnée',W/2,H/2);}
  ctx.fillStyle='rgba(148,163,184,.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
  data.forEach((d,i)=>{if(i%7===0){const x=pd.l+gW*i/(N-1);ctx.fillText(d.l,x,H-6);}});
}

function drawPie(vers){
  const c=$('chart-pie');if(!c)return;
  const ctx=c.getContext('2d');const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
  const v=vers.filter(x=>x.statut==='valide').length,a=vers.filter(x=>x.statut==='attente').length,l=vers.filter(x=>x.statut==='litige').length;
  const tot=vers.length||1;const data=[{l:'Validé',v,c:'#10b981'},{l:'Attente',v:a,c:'#f59e0b'},{l:'Litige',v:l,c:'#ef4444'}];
  const cx=W/2,cy=H/2-8,r=72;let ang=-Math.PI/2;
  for(const d of data){const sl=2*Math.PI*d.v/tot;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,ang,ang+sl);ctx.closePath();ctx.fillStyle=d.c;ctx.fill();ang+=sl;}
  ctx.beginPath();ctx.arc(cx,cy,44,0,2*Math.PI);ctx.fillStyle=isDark?'#0d2040':'#fff';ctx.fill();
  ctx.fillStyle=isDark?'#e2e8f0':'#1e293b';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText(vers.length,cx,cy+5);
  data.forEach((d,i)=>{const ly=H-32+(i-1)*12;ctx.fillStyle=d.c;ctx.fillRect(10,ly,8,8);ctx.fillStyle='rgba(148,163,184,.85)';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText(`${d.l}: ${d.v}`,22,ly+8);});
}

function renderVers(){
  const vers=myVers();const tot=vers.filter(v=>v.statut==='valide').reduce((s,v)=>s+(v.montant||0),0);
  $('content').innerHTML=`<div class="pg-hdr"><div><div class="pg-title">Versements</div><div class="pg-sub">${vers.length} versement(s) — Total validé: ${fm(tot)}</div></div></div>
  <div class="filters"><div class="srch"><span class="srch-ico">🔍</span><input id="srch-ver" placeholder="Véhicule, conducteur..." oninput="filterVers()"/></div>
  <input type="date" id="fver-dd" onchange="filterVers()" style="width:auto;min-width:130px"/>
  <input type="date" id="fver-df" onchange="filterVers()" style="width:auto;min-width:130px"/>
  <select class="fsel" id="fver-st" onchange="filterVers()"><option value="">Tous statuts</option>${STATUTS_VER.map(s=>`<option value="${s}">${s==='valide'?'Validé':s==='attente'?'En attente':'Litige'}</option>`).join('')}</select></div>
  <div class="tw" id="vers-tw">${versTable(vers)}</div>`;
}
function versTable(vers){
  if(!vers.length)return`<div class="empty-st" style="padding:50px"><div class="ei">💰</div><h3>Aucun versement</h3></div>`;
  const sorted=[...vers].sort((a,b)=>new Date(b.created_at||b.date)-new Date(a.created_at||a.date));
  let html=`<table><thead><tr><th>Date</th><th>Véhicule</th><th>Conducteur</th><th>Montant</th><th>Statut</th><th>Note</th><th>Actions</th></tr></thead><tbody>`;
  for(const v of sorted){
    const vh=getVeh(v.veh_id);const cd=getCond(v.cond_id);
    html+=`<tr><td>${fd(v.date)}</td><td><span style="font-family:var(--mono);font-size:11px;color:var(--accent)">${vh?vh.immat:'—'}</span></td><td>${cd?cd.prenom+' '+cd.nom:'—'}</td>
    <td style="font-weight:800;color:${v.statut==='valide'?'var(--green)':v.statut==='litige'?'var(--red)':'var(--yellow)'}">${fm(v.montant)}</td>
    <td>${statusBadge(v.statut)}</td><td style="font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.note||'—'}</td>
    <td><div style="display:flex;gap:3px;flex-wrap:wrap">
      ${v.statut!=='valide'?`<button class="btn btn-ok btn-xs" onclick="setVSt('${v.id}','valide')">✓</button>`:''}
      ${v.statut!=='litige'?`<button class="btn btn-d btn-xs" onclick="setVSt('${v.id}','litige')">⚠</button>`:''}
      <button class="btn btn-s btn-xs" onclick="editVers('${v.id}')">✏️</button>
      ${CU.role==='superadmin'?`<button class="btn btn-d btn-xs" onclick="delVers('${v.id}')">🗑️</button>`:''}
    </div></td></tr>`;
  }
  return html+'</tbody></table>';
}
function filterVers(){
  const q=gv('srch-ver').toLowerCase();const st=$('fver-st')?.value||'';const dd=$('fver-dd')?.value;const df=$('fver-df')?.value;
  $('vers-tw').innerHTML=versTable(myVers().filter(v=>{const vh=getVeh(v.veh_id)||{};const cd=getCond(v.cond_id)||{};const ok=!q||(vh.immat||'').toLowerCase().includes(q)||(cd.nom||'').toLowerCase().includes(q);const d=new Date(v.date);return ok&&(!st||v.statut===st)&&(!dd||d>=new Date(dd))&&(!df||d<=new Date(df+'T23:59:59'));}));
}

function showRapTab(tab,btn){curRapTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');$('rap-result').innerHTML='';}
function getRapData(){const dd=$('r-dd')?.value;const df=$('r-df')?.value;const prop=gv('r-prop');const stat=gv('r-stat');let data=curRapTab==='versements'?myVers():myDeps();if(dd)data=data.filter(d=>new Date(d.date)>=new Date(dd));if(df)data=data.filter(d=>new Date(d.date)<=new Date(df+'T23:59:59'));if(prop)data=data.filter(d=>d.prop_id===prop);if(stat&&curRapTab==='versements')data=data.filter(d=>d.statut===stat);return data.sort((a,b)=>new Date(b.date)-new Date(a.date));}
function genRap(){
  const data=getRapData();
  if(curRapTab==='versements'){
    const tot=data.filter(d=>d.statut==='valide').reduce((s,d)=>s+(d.montant||0),0);
    let html=`<div class="tw"><div class="tw-hdr"><div class="tw-title">📋 Versements (${data.length})</div></div><div style="padding:14px 18px;display:flex;gap:24px"><div><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Total validé</div><div style="font-size:18px;font-weight:800;color:var(--green)">${fm(tot)}</div></div><div><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Nombre</div><div style="font-size:18px;font-weight:800">${data.length}</div></div></div>
    <table><thead><tr><th>Date</th><th>Véhicule</th><th>Conducteur</th><th>Montant</th><th>Statut</th><th>Note</th></tr></thead><tbody>`;
    if(!data.length)html+='<tr><td colspan="6"><div class="empty-st" style="padding:24px"><h3>Aucun résultat</h3></div></td></tr>';
    for(const v of data){const vh=getVeh(v.veh_id);const cd=getCond(v.cond_id);html+=`<tr><td>${fd(v.date)}</td><td>${vh?vh.immat:'—'}</td><td>${cd?cd.prenom+' '+cd.nom:'—'}</td><td style="font-weight:800;color:var(--green)">${fm(v.montant)}</td><td>${statusBadge(v.statut)}</td><td style="font-size:11px">${v.note||'—'}</td></tr>`;}
    $('rap-result').innerHTML=html+'</tbody></table></div>';
  }else{
    const tot=data.reduce((s,d)=>s+(d.montant||0),0);
    let html=`<div class="tw"><div class="tw-hdr"><div class="tw-title">📋 Dépenses (${data.length})</div></div><div style="padding:14px 18px"><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Total dépenses</div><div style="font-size:20px;font-weight:800;color:var(--red)">${fm(tot)}</div></div>
    <table><thead><tr><th>Date</th><th>Catégorie</th><th>Véhicule</th><th>Montant</th><th>Note</th></tr></thead><tbody>`;
    if(!data.length)html+='<tr><td colspan="5"><div class="empty-st" style="padding:24px"><h3>Aucun résultat</h3></div></td></tr>';
    for(const d of data){const vh=getVeh(d.veh_id);html+=`<tr><td>${fd(d.date)}</td><td><span class="b b-or">${d.categorie||'—'}</span></td><td>${vh?vh.immat:'—'}</td><td style="font-weight:800;color:var(--red)">${fm(d.montant)}</td><td style="font-size:11px">${d.note||'—'}</td></tr>`;}
    $('rap-result').innerHTML=html+'</tbody></table></div>';
  }
}
function expCSV(){
  const data=getRapData();let csv='\uFEFF';
  if(curRapTab==='versements'){csv+='Date,Vehicule,Conducteur,Montant,Statut,Note\n';for(const v of data){const vh=getVeh(v.veh_id)||{};const cd=getCond(v.cond_id)||{};csv+=`"${fd(v.date)}","${vh.immat||'—'}","${cd.prenom||''} ${cd.nom||''}","${v.montant}","${v.statut}","${(v.note||'').replace(/"/g,"'")}"\n`;}}
  else{csv+='Date,Categorie,Vehicule,Montant,Note\n';for(const d of data){const vh=getVeh(d.veh_id)||{};csv+=`"${fd(d.date)}","${d.categorie||'—'}","${vh.immat||'—'}","${d.montant}","${(d.note||'').replace(/"/g,"'")}"\n`;}}
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`samaflotte_${curRapTab}_${new Date().toISOString().split('T')[0]}.csv`;a.click();
}

// =============================================
// UTILISATEURS
// =============================================
function renderUsers(){
  const users=C.users.filter(u=>u.role!=='superadmin');
  const rclr={proprietaire:'b-bl',employe:'b-gr'};const rlbl={proprietaire:'Propriétaire',employe:'Employé'};
  let html=`<div class="pg-hdr"><div><div class="pg-title">Gestion des accès</div><div class="pg-sub">${users.length} utilisateur(s)</div></div></div>
  <div class="tw"><table><thead><tr><th>Utilisateur</th><th>Rôle</th><th>Email</th><th>Statut</th><th>Actions</th></tr></thead><tbody>`;
  if(!users.length)html+='<tr><td colspan="5"><div class="empty-st" style="padding:40px"><div class="ei">👥</div><h3>Aucun utilisateur</h3></div></td></tr>';
  for(const u of users){html+=`<tr><td><div style="display:flex;align-items:center;gap:8px">${avEl(u.nom,u.prenom,avc(u.email||''),'sm',u.logo)}<div style="font-weight:700">${u.prenom||''} ${u.nom||''}</div></div></td><td><span class="b ${rclr[u.role]||'b-gy'}">${rlbl[u.role]||u.role}</span></td><td style="font-size:11px;color:var(--accent)">${u.email}</td><td>${u.actif!==false?'<span class="b b-gr">Actif</span>':'<span class="b b-rd">Suspendu</span>'}</td>
  <td><div style="display:flex;gap:4px"><button class="btn btn-${u.actif!==false?'d':'ok'} btn-xs" onclick="toggleUser('${u.id}')">${u.actif!==false?'Suspendre':'Activer'}</button><button class="btn btn-d btn-xs" onclick="delUser('${u.id}')">🗑️</button></div></td></tr>`;}
  $('content').innerHTML=html+'</tbody></table></div>';
}
window.openAddUser=function(){
  openModal(`<div class="mh"><div class="mh-title">👤 Nouvel utilisateur</div><div class="x-btn" onclick="closeModal()">✕</div></div>
  <div class="mb"><div class="fg">
    <div class="fgrp"><label>Prénom *</label><input id="nu-prenom" placeholder="Prénom"/></div>
    <div class="fgrp"><label>Nom *</label><input id="nu-nom" placeholder="Nom"/></div>
    <div class="fgrp"><label>Email *</label><input type="email" id="nu-email" placeholder="email@ex.com"/></div>
    <div class="fgrp"><label>Rôle *</label><select id="nu-role"><option value="employe">Employé / Agent</option><option value="proprietaire">Propriétaire</option></select></div>
    <div class="fgrp"><label>Mot de passe *</label><input type="password" id="nu-pwd" placeholder="Min 8 car."/></div>
    <div class="fgrp"><label>Confirmer *</label><input type="password" id="nu-pwd2" placeholder="Répéter"/></div>
  </div><div id="nu-err" class="err-msg"></div></div>
  <div class="mf"><button class="btn btn-s" onclick="closeModal()">Annuler</button><button class="btn btn-p" onclick="saveUser()">Créer</button></div>`);
};
async function saveUser(){
  const prenom=gv('nu-prenom'),nom=gv('nu-nom'),email=gv('nu-email'),role=gv('nu-role'),pwd=gvr('nu-pwd'),pwd2=gvr('nu-pwd2');
  const err=$('nu-err');err.style.display='none';
  if(!prenom||!nom||!email||!pwd){err.textContent='Champs obligatoires manquants';err.style.display='block';return;}
  if(pwd!==pwd2){err.textContent='Mots de passe différents';err.style.display='block';return;}
  if(pwd.length<8){err.textContent='Mot de passe trop court';err.style.display='block';return;}
  const{data:sd,error:se}=await sb.auth.signUp({email,password:pwd});
  if(se){err.textContent='Erreur: '+se.message;err.style.display='block';return;}
  const nid=uid();
  await dbIns('users',{id:nid,auth_id:sd.user?.id||null,nom,prenom,email,role,actif:true,created_at:now()});
  if(role==='proprietaire')await dbIns('proprietaires',{id:uid(),uid:nid,tel:'',adresse:'',created_at:now()});
  await addLog('Création utilisateur',prenom+' '+nom+' ('+role+')');closeModal();renderUsers();
}
async function toggleUser(uid_){const u=C.users.find(x=>x.id===uid_);if(!u)return;await dbUpd('users',uid_,{actif:!u.actif});await addLog((u.actif?'Suspension':'Activation')+' compte',u.prenom+' '+u.nom);renderUsers();}
async function delUser(uid_){if(!confirm('Supprimer définitivement cet utilisateur ?'))return;const u=C.users.find(x=>x.id===uid_);await dbDel('users',uid_);if(u?.role==='proprietaire')C.proprietaires=C.proprietaires.filter(p=>p.uid!==uid_);await addLog('Suppression utilisateur',u?.prenom+' '+u?.nom);renderUsers();}

// =============================================
// JOURNAL
// =============================================
function renderActivity(){
  const acts=C.activity;
  let html=`<div class="pg-hdr"><div><div class="pg-title">Journal d'activité</div><div class="pg-sub">${acts.length} action(s)</div></div></div>
  <div class="tw"><table><thead><tr><th>Date/Heure</th><th>Action</th><th>Détail</th></tr></thead><tbody>`;
  if(!acts.length)html+='<tr><td colspan="3"><div class="empty-st" style="padding:40px"><h3>Aucune activité</h3></div></td></tr>';
  for(const a of acts){html+=`<tr><td style="font-family:var(--mono);font-size:10px;white-space:nowrap">${fdt(a.ts)}</td><td><span class="b b-bl" style="font-size:10px">${a.action}</span></td><td style="font-size:11px;color:var(--text3)">${a.detail||'—'}</td></tr>`;}
  $('content').innerHTML=html+'</tbody></table></div>';
}

    <div style="padding:16px">
      <div style="text-align:center;margin-bottom:16px"><div style="width:80px;height:80px;border-radius:50%;background:${avc(u.email)};display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;margin:0 auto 10px">${ini(u.nom,u.prenom)}</div></div>
      <div class="fgrp"><label>Prénom</label><input id="prof-prenom" value="${u.prenom||''}"/></div>
      <div class="fgrp"><label>Nom</label><input id="prof-nom" value="${u.nom||''}"/></div>
      <div class="fgrp"><label>Email</label><input type="email" id="prof-email" value="${u.email||''}"/></div>
      <div class="fgrp"><label>Téléphone</label><input id="prof-tel" value="${u.tel||''}"/></div>
      <button class="btn btn-p" onclick="saveProfil()">💾 Enregistrer</button>
      <div id="prof-ok" class="ok-msg">✅ Profil mis à jour</div>
    </div></div>
    <div class="tw"><div class="tw-hdr"><div class="tw-title">📊 Compte</div></div>
    <div style="padding:16px">
      <div class="dr"><span class="dl">Rôle</span><span class="dv">${{superadmin:'Super Admin',proprietaire:'Propriétaire',employe:'Employé'}[u.role]||u.role}</span></div>
      <div class="dr"><span class="dl">Email</span><span class="dv">${u.email}</span></div>
      <div class="dr"><span class="dl">Statut</span><span class="dv"><span class="b b-gr">Actif</span></span></div>
      <div class="dr"><span class="dl">Connexion via</span><span class="dv">Supabase Auth ✅</span></div>
    </div></div>
  </div>`;
}
async function saveProfil(){
  const upd={prenom:gv('prof-prenom'),nom:gv('prof-nom'),email:gv('prof-email'),tel:gv('prof-tel')};
  await dbUpd('users',CU.id,upd);CU={...CU,...upd};refreshUser();
  const ok=$('prof-ok');ok.style.display='flex';setTimeout(()=>ok.style.display='none',3000);
}

// =============================================
// INIT
// =============================================
async function init(){
  const savedTheme=localStorage.getItem('sf2_theme');
  if(savedTheme==='light'){isDark=false;document.body.classList.add('light');const sw=$('sw-theme');if(sw)sw.classList.remove('on');$('theme-lbl').textContent='☀️ Mode clair';}
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    const{data:uData}=await sb.from('users').select('*').eq('auth_id',session.user.id).single();
    if(uData&&uData.actif!==false){CU=uData;await loadAll();$('load-ov').style.display='none';startApp();return;}
  }
  $('load-ov').style.display='none';$('login-page').style.display='flex';
  ['ln-email','ln-pwd'].forEach(id=>{const el=$(id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});});
}
init();
</script>
