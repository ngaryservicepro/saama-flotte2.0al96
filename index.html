<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sama Flotte 2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#071122;--bg2:#0a1a35;--bg3:#0d2040;--sidebar:#0a1a35;
--accent:#a78bfa;--accent2:#7c3aed;--accent3:#6d28d9;
--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
--border:#1e3a5f;--border2:#2d4a6f;
--card:#0d2040;--card2:#0f2547;
--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--orange:#f97316;
--radius:12px;--radius-sm:8px;--radius-lg:16px;
--shadow:0 4px 24px rgba(0,0,0,0.4);
--font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
.light{
--bg:#f0f2f8;--bg2:#e8ecf4;--bg3:#dde3ef;--sidebar:#fff;
--accent:#534AB7;--accent2:#534AB7;--accent3:#3d369e;
--text:#1e293b;--text2:#475569;--text3:#94a3b8;
--border:#d1d9e6;--border2:#b8c4d8;--card:#fff;--card2:#f8faff;
--shadow:0 4px 24px rgba(83,74,183,.08);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
input,select,textarea{font-family:var(--font);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 13px;border-radius:var(--radius-sm);font-size:13px;width:100%;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(167,139,250,.12)}
.light input,.light select,.light textarea{background:#f8faff}
button{font-family:var(--font);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:250px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .3s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:60px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}

/* SIDEBAR */
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent2),#a78bfa);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo h1{font-size:15px;font-weight:800;letter-spacing:-.4px}
.sb-logo p{font-size:10px;color:var(--text3);font-weight:500}
.sb-user{margin:10px 10px 0;padding:10px 12px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-user-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.sb-user-av img{width:100%;height:100%;object-fit:cover}
.sb-user-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.sb-user-email{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.role-pill{font-size:9px;padding:2px 7px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:inline-block;margin-top:3px}
.rp-sa{background:rgba(167,139,250,.2);color:var(--accent)}
.rp-prop{background:rgba(59,130,246,.2);color:#3b82f6}
.rp-emp{background:rgba(16,185,129,.2);color:#10b981}
.sb-nav{padding:10px 10px;flex:1}
.nav-sec-title{font-size:9px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;padding:8px 8px 3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:all .12s;margin-bottom:1px;border:1px solid transparent;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(124,58,237,.15);color:var(--accent);border-color:rgba(124,58,237,.25)}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:9px;padding:1px 6px;font-weight:700}
.sb-bottom{padding:10px;border-top:1px solid var(--border)}
.theme-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:6px;font-size:12px;color:var(--text2)}
.sw{width:36px;height:20px;background:var(--border2);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.sw.on{background:var(--accent2)}
.sw-k{width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s}
.sw.on .sw-k{transform:translateX(16px)}
.logout-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--red);font-size:12px;font-weight:600;width:100%;background:none;border:none;text-align:left;transition:background .15s}
.logout-btn:hover{background:rgba(239,68,68,.1)}

/* TOPBAR */
.tb-title{font-size:17px;font-weight:800;letter-spacing:-.3px}
.tb-sub{font-size:11px;color:var(--text3);margin-top:1px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.notif-wrap{position:relative}
.notif-btn{width:36px;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:border-color .15s}
.notif-btn:hover{border-color:var(--accent)}
.notif-dot{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;border-radius:10px;font-size:9px;padding:1px 5px;font-weight:700;min-width:16px;text-align:center}
.action-btn{padding:8px 14px;background:var(--accent2);color:#fff;border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:var(--accent3)}

/* NOTIF PANEL */
.notif-panel{position:fixed;top:60px;right:12px;width:340px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);z-index:1000;max-height:440px;overflow-y:auto;display:none}
.notif-panel.open{display:block}
.notif-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;position:sticky;top:0;background:var(--card)}
.notif-item{padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;transition:background .12s}
.notif-item:hover{background:var(--bg3)}
.ndot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:2000;padding:16px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-lg{max-width:720px}
.modal-xl{max-width:860px}
.mh{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1}
.mh-title{font-size:15px;font-weight:800}
.mb{padding:20px}
.mf{padding:14px 20px;border-bottom:none;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}
.x-btn{width:28px;height:28px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text2);flex-shrink:0}
.x-btn:hover{border-color:var(--red);color:var(--red)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg1{grid-column:1/-1}
.fgrp{margin-bottom:12px}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:700;border:none;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn-p{background:var(--accent2);color:#fff}.btn-p:hover{background:var(--accent3)}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border)}.btn-s:hover{border-color:var(--border2)}
.btn-d{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25)}.btn-d:hover{background:rgba(239,68,68,.2)}
.btn-ok{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.25)}.btn-ok:hover{background:rgba(16,185,129,.2)}
.btn-w{background:rgba(245,158,11,.1);color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}
.btn-ico{padding:6px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px}.btn-ico:hover{border-color:var(--accent);color:var(--accent)}

/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;transition:transform .15s,border-color .15s;cursor:default}
.kpi:hover{transform:translateY(-2px);border-color:var(--border2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi.gr::before{background:var(--green)}.kpi.bl::before{background:var(--blue)}
.kpi.vi::before{background:var(--accent)}.kpi.rd::before{background:var(--red)}
.kpi.or::before{background:var(--orange)}.kpi.ye::before{background:var(--yellow)}
.kpi-ico{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:18px}
.kpi-ico.gr{background:rgba(16,185,129,.15)}.kpi-ico.bl{background:rgba(59,130,246,.15)}
.kpi-ico.vi{background:rgba(167,139,250,.15)}.kpi-ico.rd{background:rgba(239,68,68,.15)}
.kpi-ico.or{background:rgba(249,115,22,.15)}.kpi-ico.ye{background:rgba(245,158,11,.15)}
.kpi-val{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:4px}
.kpi-label{font-size:12px;color:var(--text2);font-weight:600}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* TABLE */
.tw{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.tw-hdr{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap}
.tw-title{font-size:14px;font-weight:800}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;font-size:12px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.015)}
.light tbody tr:hover td{background:rgba(83,74,183,.025)}

/* BADGE */
.b{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.b::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.b-gr{background:rgba(16,185,129,.15);color:var(--green)}
.b-rd{background:rgba(239,68,68,.15);color:var(--red)}
.b-ye{background:rgba(245,158,11,.15);color:var(--yellow)}
.b-bl{background:rgba(59,130,246,.15);color:var(--blue)}
.b-gy{background:var(--bg3);color:var(--text3)}
.b-or{background:rgba(249,115,22,.15);color:var(--orange)}
.b-vi{background:rgba(167,139,250,.15);color:var(--accent)}

/* MISC */
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.srch{position:relative;flex:1;min-width:180px}
.srch input{padding-left:34px}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);pointer-events:none}
.fsel{width:auto!important;min-width:130px}
.empty-st{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-st .ei{font-size:42px;margin-bottom:12px}
.empty-st h3{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-st p{font-size:12px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av-sm{width:30px;height:30px;font-size:11px}
.av-md{width:38px;height:38px;font-size:13px}
.av-lg{width:56px;height:56px;font-size:18px}
.pg{display:flex;align-items:center;gap:4px;padding:12px 16px;border-top:1px solid var(--border);flex-wrap:wrap}
.pg-btn{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pg-btn:hover{border-color:var(--accent);color:var(--accent)}
.pg-btn.on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.pg-info{margin-left:auto;font-size:11px;color:var(--text3)}
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.al-r{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.al-y{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fcd34d}
.al-b{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93c5fd}
.al-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.al-v{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);color:var(--accent)}
.err-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;margin-top:10px;display:none}
.ok-msg{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7;padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;margin-top:10px;display:none}
.pg-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.pg-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.pg-sub{font-size:12px;color:var(--text3);margin-top:2px}
.dr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px}
.dr:last-child{border-bottom:none}
.dl{color:var(--text3);font-weight:600}
.dv{color:var(--text);font-weight:700;text-align:right}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:16px}
.ch-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.ch-title{font-size:12px;font-weight:800;margin-bottom:14px;color:var(--text);text-transform:uppercase;letter-spacing:.4px}
.tabs{display:flex;gap:3px;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;width:fit-content;margin-bottom:16px}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);background:none;border:none;transition:all .15s}
.tab.on{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.uplz{border:2px dashed var(--border2);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg3);position:relative}
.uplz:hover{border-color:var(--accent);background:rgba(124,58,237,.05)}
.uplz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uplz-ico{font-size:28px;margin-bottom:6px}
.uplz-txt{font-size:11px;color:var(--text3)}
.logo-preview{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--border2)}
.chg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}

/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.ln-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 15% 50%,rgba(124,58,237,.2) 0%,transparent 55%),radial-gradient(ellipse at 85% 15%,rgba(59,130,246,.12) 0%,transparent 45%)}
.ln-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;width:100%;max-width:400px;position:relative;z-index:1;box-shadow:var(--shadow)}
.ln-logo{text-align:center;margin-bottom:28px}
.ln-logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent2),#a78bfa);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 10px}
.ln-logo h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
.ln-logo p{font-size:12px;color:var(--text3);margin-top:3px}
.ln-btn{width:100%;padding:11px;background:var(--accent2);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:800;cursor:pointer;margin-top:6px;transition:all .15s;letter-spacing:.3px}
.ln-btn:hover{background:var(--accent3)}

@media(max-width:768px){
#sidebar{position:fixed;left:-250px;height:100%;z-index:300;transition:left .3s}
#sidebar.mob-open{left:0}
.kpi-grid{grid-template-columns:1fr 1fr}
.charts-grid{grid-template-columns:1fr}
.fg{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-page">
<div class="ln-bg"></div>
<div class="ln-card">
  <div class="ln-logo">
    <div class="ln-logo-icon">🚌</div>
    <h1>Sama Flotte 2.0</h1>
    <p>Plateforme de gestion de flotte de transport</p>
  </div>
  <div id="ln-err" class="err-msg"></div>
  <div class="fgrp"><label>Adresse email</label><input type="email" id="ln-email" placeholder="votre@email.com"/></div>
  <div class="fgrp"><label>Mot de passe</label><input type="password" id="ln-pwd" placeholder="••••••••"/></div>
  <button class="ln-btn" id="ln-btn" onclick="doLogin()">Connexion →</button>
  <p style="text-align:center;margin-top:18px;font-size:11px;color:var(--text3)">Sama Flotte 2.0 — Tous droits réservés</p>
</div>
</div>

<!-- ===== APP ===== -->
<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">🚌</div>
      <div><h1>Sama Flotte</h1><p>v2.0 — Gestion flotte</p></div>
    </div>
    <div class="sb-user">
      <div class="sb-user-av" id="sb-av" style="background:#7c3aed;color:#fff">SA</div>
      <div style="min-width:0">
        <div class="sb-user-name" id="sb-name">Aliou Cissé</div>
        <div class="sb-user-email" id="sb-email">admin@samaflotte.sn</div>
        <div class="role-pill rp-sa" id="sb-role">Super Admin</div>
      </div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-bottom">
      <div class="theme-row">
        <span id="theme-lbl">🌙 Mode sombre</span>
        <div class="sw on" id="sw-theme" onclick="toggleTheme()"><div class="sw-k"></div></div>
      </div>

const fn  = n => new Intl.NumberFormat('fr-FR').format(n||0);

function ini(n,p){
  return((p||'')[0]||(n||'')[0]||'?').toUpperCase()+((n||'')[0]||'').toUpperCase();
}
function avc(s){
  const c=['#7c3aed','#3b82f6','#10b981','#f59e0b','#ef4444','#ec4899','#06b6d4','#84cc16'];
  let h=0;for(let ch of(s||''))h+=ch.charCodeAt(0);
  return c[h%c.length];
}
function hpwd(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0}return'h$'+Math.abs(h)+'$'+btoa(unescape(encodeURIComponent(p)));}
function cpwd(p,h){if(!h)return false;try{const parts=h.split('$');if(parts[0]==='h')return decodeURIComponent(escape(atob(parts[2])))===p;}catch{return false;}return false;}
function daysDiff(d){if(!d)return 9999;return Math.floor((new Date(d)-new Date())/(864e5));}
function av(name,prenom,color,size,logo){
  const bg=color||avc((prenom||'')+(name||''));

  if(logo)return`<div class="${cls}" style="background:${bg}">${`<img src="${logo}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`}</div>`;
  return`<div class="${cls}" style="background:${bg};color:#fff">${ini(name,prenom)}</div>`;
}

function getDocAlerts(){
  const conds=DB.g('conducteurs')||[];
  const res=[];
  for(const c of conds){
    if(CU.role==='proprietaire'&&c.prop_id!==CU.id) continue;
    const ck=(label,date,url)=>{
      if(!url&&!date){res.push({t:'b',msg:`${c.prenom} ${c.nom}: ${label} manquant`});return;}
      if(date){const d=daysDiff(date);
        if(d<0) res.push({t:'r',msg:`${c.prenom} ${c.nom}: ${label} expiré (${Math.abs(d)}j)`});
        else if(d<30) res.push({t:'y',msg:`${c.prenom} ${c.nom}: ${label} expire dans ${d}j`});
      }
    };
    ck('CNI',c.cni_exp,c.cni_url);ck('Permis',c.permis_exp,c.permis_url);
  }
  return res;
}

function buildNotifs(){
  const al=getDocAlerts();
  const nd=$('n-dot');
  if(al.length>0){nd.textContent=al.length;nd.style.display='block';}else nd.style.display='none';
  const vers=DB.g('versements')||[];
  const td=new Date().toDateString();
  const tvd=vers.filter(v=>new Date(v.date).toDateString()===td);
  let html='';
  if(al.length===0&&tvd.length===0){html='<div class="empty-st" style="padding:28px"><div class="ei">✅</div><p>Aucune alerte</p></div>';}
  const cols={r:'var(--red)',y:'var(--yellow)',b:'var(--blue)',g:'var(--green)'};
  for(const a of al){
    html+=`<div class="notif-item"><div class="ndot" style="background:${cols[a.t]||'gray'}"></div><span>${a.msg}</span></div>`;
  }
  if(tvd.length>0){
    html+=`<div class="notif-item"><div class="ndot" style="background:var(--green)"></div><span>${tvd.length} versement(s) saisi(s) aujourd'hui — Total: ${fm(tvd.reduce((s,v)=>s+(v.montant||0),0))}</span></div>`;
  }
  if(!html) html='<div class="empty-st" style="padding:28px"><div class="ei">🔔</div><p>Aucune notification</p></div>';
  $('n-list').innerHTML=html;
}

  const tdVers=vVal.filter(v=>new Date(v.date).toDateString()===tdStr);

function drawLine(vers){
  const c=$('chart-line');if(!c)return;
  const ctx=c.getContext('2d');const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
  const N=30;const data=[];const td=new Date();
  for(let i=N-1;i>=0;i--){
    const d=new Date(td);d.setDate(d.getDate()-i);
    const s=d.toDateString();
    const t=vers.filter(v=>new Date(v.date).toDateString()===s&&v.statut==='valide').reduce((s,v)=>s+(v.montant||0),0);
    data.push({l:d.getDate()+'/'+(d.getMonth()+1),v:t});
  }
  const mx=Math.max(...data.map(d=>d.v),1);
  const pd={l:58,r:18,t:16,b:36};const gW=W-pd.l-pd.r,gH=H-pd.t-pd.b;
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pd.t+gH*(1-i/4);ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(pd.l+gW,y);ctx.stroke();
    ctx.fillStyle='rgba(148,163,184,.7)';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(fn(Math.round(mx*i/4/1000))+'k',pd.l-4,y+4);}
  if(data.some(d=>d.v>0)){
    ctx.beginPath();ctx.strokeStyle='#7c3aed';ctx.lineWidth=2.5;ctx.lineJoin='round';
    data.forEach((d,i)=>{const x=pd.l+gW*i/(N-1);const y=pd.t+gH*(1-d.v/mx);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();
    ctx.globalAlpha=.12;const grad=ctx.createLinearGradient(0,pd.t,0,pd.t+gH);
    grad.addColorStop(0,'#7c3aed');grad.addColorStop(1,'transparent');ctx.fillStyle=grad;
    ctx.beginPath();data.forEach((d,i)=>{const x=pd.l+gW*i/(N-1);const y=pd.t+gH*(1-d.v/mx);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.lineTo(pd.l+gW,pd.t+gH);ctx.lineTo(pd.l,pd.t+gH);ctx.closePath();ctx.fill();ctx.globalAlpha=1;
  }else{ctx.fillStyle='rgba(148,163,184,.4)';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('Aucune donnée',W/2,H/2);}
  ctx.fillStyle='rgba(148,163,184,.7)';ctx.font='10px sans-serif';ctx.textAlign='center';
  data.forEach((d,i)=>{if(i%7===0){const x=pd.l+gW*i/(N-1);ctx.fillText(d.l,x,H-6);}});
}

function drawPie(vers){
  const c=$('chart-pie');if(!c)return;
  const ctx=c.getContext('2d');const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
  const v=vers.filter(x=>x.statut==='valide').length;
  const a=vers.filter(x=>x.statut==='attente').length;
  const l=vers.filter(x=>x.statut==='litige').length;
  const tot=vers.length||1;
  const data=[{l:'Validé',v,c:'#10b981'},{l:'Attente',v:a,c:'#f59e0b'},{l:'Litige',v:l,c:'#ef4444'}];
  const cx=W/2,cy=H/2-8,r=72;let ang=-Math.PI/2;
  for(const d of data){
    const sl=2*Math.PI*d.v/tot;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,ang,ang+sl);ctx.closePath();
    ctx.fillStyle=d.c;ctx.fill();ang+=sl;
  }
  ctx.beginPath();ctx.arc(cx,cy,44,0,2*Math.PI);ctx.fillStyle=isDark?'#0d2040':'#fff';ctx.fill();
  ctx.fillStyle=isDark?'#e2e8f0':'#1e293b';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText(vers.length,cx,cy+5);
  data.forEach((d,i)=>{const ly=H-32+(i-1)*12;ctx.fillStyle=d.c;ctx.fillRect(10,ly,8,8);
    ctx.fillStyle='rgba(148,163,184,.85)';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText(`${d.l}: ${d.v}`,22,ly+8);});
}

function drawBar(vers,props){
  const c=$('chart-bar');if(!c)return;
  const ctx=c.getContext('2d');const W=c.width,H=c.height;ctx.clearRect(0,0,W,H);
  const data=props.map(p=>{
    const u=getUser(p.uid)||{};
    const t=vers.filter(v=>v.prop_id===p.uid&&v.statut==='valide').reduce((s,v)=>s+(v.montant||0),0);
    return{l:(u.prenom||'?')+' '+(u.nom||'').charAt(0)+'.',v:t};
  }).sort((a,b)=>b.v-a.v).slice(0,8);
  if(!data.length){ctx.fillStyle='rgba(148,163,184,.4)';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('Aucune donnée',W/2,H/2);return;}
  const mx=Math.max(...data.map(d=>d.v),1);
  const pd={l:56,r:16,t:16,b:44};const gW=W-pd.l-pd.r,gH=H-pd.t-pd.b;
  const bw=Math.min(gW/data.length-10,52);
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pd.t+gH*(1-i/4);ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(pd.l+gW,y);ctx.stroke();
    ctx.fillStyle='rgba(148,163,184,.7)';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(fn(Math.round(mx*i/4/1000))+'k',pd.l-3,y+4);}
  data.forEach((d,i)=>{
    const bh=gH*d.v/mx;const x=pd.l+gW*i/data.length+(gW/data.length-bw)/2;const y=pd.t+gH-bh;
    const g=ctx.createLinearGradient(0,y,0,y+bh);g.addColorStop(0,'#7c3aed');g.addColorStop(1,'#a78bfa');
    ctx.fillStyle=g;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x,y,bw,bh,3);else ctx.rect(x,y,bw,bh);ctx.fill();
    ctx.fillStyle='rgba(148,163,184,.8)';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.l,x+bw/2,pd.t+gH+16);
  });
}

function filterProps(){

function updateVeh(vid){
  const vehs=DB.g('vehicules')||[];const v=vehs.find(x=>x.id===vid);if(!v)return;
  v.immat=gv('ev-immat').toUpperCase()||v.immat;v.marque=gv('ev-marque');v.modele=gv('ev-modele');
  v.annee=gv('ev-annee');v.type=gv('ev-type');v.statut=gv('ev-statut');v.couleur=gv('ev-couleur');
  if(CU.role==='superadmin')v.prop_id=gv('ev-prop');
  const affs=DB.g('affectations')||[];
  affs.forEach(a=>{if(a.veh_id===vid)a.actif=false;});
  const boxes=$('modal-box').querySelectorAll('input[type=checkbox]');
  boxes.forEach(cb=>{
    if(cb.checked){const ex=affs.find(a=>a.veh_id===vid&&a.cond_id===cb.value);
      if(ex)ex.actif=true;else affs.push({id:uid(),veh_id:vid,cond_id:cb.value,date:now(),actif:true});}
  });
  DB.s('vehicules',vehs);DB.s('affectations',affs);log('Modif véhicule',v.immat);closeModal();renderVehs();
}

function delVeh(vid){
  if(!confirm('Supprimer ce véhicule définitivement ?'))return;
  const vehs=DB.g('vehicules')||[];const i=vehs.findIndex(v=>v.id===vid);if(i<0)return;
  const immat=vehs[i].immat;vehs.splice(i,1);DB.s('vehicules',vehs);log('Suppression véhicule',immat);renderVehs();
}

      <td><span class="b ${sco[c.statut]||'b-gy'}">${c.statut||'—'}</span></td>
      <td>${al.map(a=>`<span class="b ${a.t==='r'?'b-rd':a.t==='y'?'b-ye':'b-bl'}" style="font-size:9px">${ico[a.t]} ${a.m}</span>`).join(' ')||'<span style="color:var(--green);font-size:12px">✓ OK</span>'}</td>
      <td><div style="display:flex;gap:4px">
        <button class="btn-ico btn-xs" onclick="viewCond('${c.id}')">👁️</button>

      </div></td>
    </tr>`;
  }
  return html+'</tbody></table>';

function renderVers(){
  const vers=myVers();
  const tot=vers.filter(v=>v.statut==='valide').reduce((s,v)=>s+(v.montant||0),0);
  let html=`<div class="pg-hdr"><div><div class="pg-title">Versements</div><div class="pg-sub">${vers.length} versement(s) — Total validé: ${fm(tot)}</div></div></div>
  <div class="filters">
    <div class="srch"><span class="srch-ico">🔍</span><input id="srch-ver" placeholder="Véhicule, conducteur..." oninput="filterVers()"/></div>
    <input type="date" id="fver-dd" onchange="filterVers()" style="width:auto;min-width:130px" title="Depuis"/>
    <input type="date" id="fver-df" onchange="filterVers()" style="width:auto;min-width:130px" title="Jusqu'au"/>
    <select class="fsel" id="fver-st" onchange="filterVers()"><option value="">Tous statuts</option>${STATUTS_VER.map(s=>`<option value="${s}">${s==='valide'?'Validé':s==='attente'?'En attente':'Litige'}</option>`).join('')}</select>
  </div>
  <div class="tw" id="vers-tw">${versTable(vers)}</div>`;
  $('content').innerHTML=html;
}

function versTable(vers){
  if(!vers.length) return`<div class="empty-st" style="padding:50px"><div class="ei">💰</div><h3>Aucun versement</h3><p>Enregistrez le premier versement</p></div>`;
  const sorted=[...vers].sort((a,b)=>new Date(b.created||b.date)-new Date(a.created||a.date));
  let html=`<table><thead><tr><th>Date</th><th>Véhicule</th><th>Conducteur</th><th>Montant</th><th>Statut</th><th>Agent</th><th>Note</th><th>Actions</th></tr></thead><tbody>`;
  for(const v of sorted){
    const vh=getVeh(v.veh_id);const cd=getCond(v.cond_id);const ag=getUser(v.agent_id);
    html+=`<tr>
      <td style="white-space:nowrap">${fd(v.date)}</td>
      <td><span style="font-family:var(--mono);font-size:11px;color:var(--accent)">${vh?vh.immat:'—'}</span></td>
      <td>${cd?cd.prenom+' '+cd.nom:'—'}</td>
      <td style="font-weight:800;color:${v.statut==='valide'?'var(--green)':v.statut==='litige'?'var(--red)':'var(--yellow)'}">${fm(v.montant)}</td>
      <td>${statusBadge(v.statut)}</td>
      <td style="font-size:10px;color:var(--text3)">${ag?ag.prenom+' '+ag.nom.charAt(0)+'.':'—'}</td>
      <td style="font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.note||'—'}</td>
      <td><div style="display:flex;gap:3px;flex-wrap:wrap">
        ${v.statut!=='valide'?`<button class="btn btn-ok btn-xs" onclick="setVersStatut('${v.id}','valide')">✓</button>`:''}
        ${v.statut!=='litige'?`<button class="btn btn-d btn-xs" onclick="setVersStatut('${v.id}','litige')">⚠</button>`:''}
        <button class="btn btn-s btn-xs" onclick="editVers('${v.id}')">✏️</button>
        ${CU.role==='superadmin'?`<button class="btn btn-d btn-xs" onclick="delVers('${v.id}')">🗑️</button>`:''}
      </div></td>
    </tr>`;
  }
  return html+'</tbody></table>';
}

function filterVers(){
  const q=gv('srch-ver').toLowerCase();const st=$('fver-st')?.value||'';
  const dd=$('fver-dd')?.value;const df=$('fver-df')?.value;
  const vers=myVers().filter(v=>{
    const vh=getVeh(v.veh_id)||{};const cd=getCond(v.cond_id)||{};
    const ok=!q||(vh.immat||'').toLowerCase().includes(q)||(cd.nom||'').toLowerCase().includes(q)||(cd.prenom||'').toLowerCase().includes(q);
    const d=new Date(v.date);
    return ok&&(!st||v.statut===st)&&(!dd||d>=new Date(dd))&&(!df||d<=new Date(df+'T23:59:59'));
  });
  $('vers-tw').innerHTML=versTable(vers);
}

function updateDep(did){
  const deps=DB.g('depenses')||[];const d=deps.find(x=>x.id===did);if(!d)return;

  DB.s('depenses',deps);log('Modif dépense',d.categorie);closeModal();renderDeps();

function delDep(did){
  if(CU.role!=='superadmin'){alert('Réservé au Super Admin');return;}
  if(!confirm('Supprimer cette dépense ?'))return;
  const deps=DB.g('depenses')||[];const i=deps.findIndex(d=>d.id===did);if(i<0)return;
  deps.splice(i,1);DB.s('depenses',deps);log('Suppression dépense','—');renderDeps();
}

let curRapTab='versements';
function showRapportTab(tab,btn){
  curRapTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  const sw=$('r-stat-wrap');
  if(sw) sw.style.display=tab==='versements'?'block':'none';
  $('rap-result').innerHTML='';
}

function getRapData(){
  const dd=$('r-dd')?.value;const df=$('r-df')?.value;
  const prop=gv('r-prop');const stat=gv('r-stat');
  let data=curRapTab==='versements'?myVers():myDeps();
  if(dd) data=data.filter(d=>new Date(d.date)>=new Date(dd));
  if(df) data=data.filter(d=>new Date(d.date)<=new Date(df+'T23:59:59'));
  if(prop) data=data.filter(d=>d.prop_id===prop);
  if(stat&&curRapTab==='versements') data=data.filter(d=>d.statut===stat);
  return data.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function genRap(){
  const data=getRapData();
  if(curRapTab==='versements'){
    const tot=data.filter(d=>d.statut==='valide').reduce((s,d)=>s+(d.montant||0),0);
    const totAll=data.reduce((s,d)=>s+(d.montant||0),0);
    let html=`<div class="tw"><div class="tw-hdr"><div class="tw-title">📋 Versements (${data.length})</div></div>
    <div style="padding:14px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div style="text-align:center"><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Total brut</div><div style="font-size:18px;font-weight:800">${fm(totAll)}</div></div>
      <div style="text-align:center"><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Total validé</div><div style="font-size:18px;font-weight:800;color:var(--green)">${fm(tot)}</div></div>
      <div style="text-align:center"><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Nombre</div><div style="font-size:18px;font-weight:800">${data.length}</div></div>
    </div>
    <table><thead><tr><th>Date</th><th>Véhicule</th><th>Conducteur</th><th>Montant</th><th>Statut</th><th>Note</th></tr></thead><tbody>`;
    if(!data.length) html+='<tr><td colspan="6"><div class="empty-st" style="padding:24px"><h3>Aucun résultat</h3></div></td></tr>';
    for(const v of data){const vh=getVeh(v.veh_id);const cd=getCond(v.cond_id);
      html+=`<tr><td>${fd(v.date)}</td><td>${vh?vh.immat:'—'}</td><td>${cd?cd.prenom+' '+cd.nom:'—'}</td><td style="font-weight:800;color:var(--green)">${fm(v.montant)}</td><td>${statusBadge(v.statut)}</td><td style="font-size:11px">${v.note||'—'}</td></tr>`;}
    html+='</tbody></table></div>';
    $('rap-result').innerHTML=html;
  }else{
    const tot=data.reduce((s,d)=>s+(d.montant||0),0);
    let html=`<div class="tw"><div class="tw-hdr"><div class="tw-title">📋 Dépenses (${data.length})</div></div>
    <div style="padding:14px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="text-align:center"><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Total dépenses</div><div style="font-size:20px;font-weight:800;color:var(--red)">${fm(tot)}</div></div>
      <div style="text-align:center"><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Nombre</div><div style="font-size:20px;font-weight:800">${data.length}</div></div>
    </div>
    <table><thead><tr><th>Date</th><th>Catégorie</th><th>Véhicule</th><th>Montant</th><th>Note</th></tr></thead><tbody>`;
    if(!data.length) html+='<tr><td colspan="5"><div class="empty-st" style="padding:24px"><h3>Aucun résultat</h3></div></td></tr>';
    for(const d of data){const vh=getVeh(d.veh_id);
      html+=`<tr><td>${fd(d.date)}</td><td><span class="b b-or">${d.categorie||'—'}</span></td><td>${vh?vh.immat:'—'}</td><td style="font-weight:800;color:var(--red)">${fm(d.montant)}</td><td style="font-size:11px">${d.note||'—'}</td></tr>`;}
    html+='</tbody></table></div>';
    $('rap-result').innerHTML=html;
  }
}

function expCSV(){
  const data=getRapData();
  let csv='\uFEFF';
  if(curRapTab==='versements'){
    csv+='Date,Vehicule,Conducteur,Montant,Statut,Note\n';
    for(const v of data){const vh=getVeh(v.veh_id)||{};const cd=getCond(v.cond_id)||{};
      csv+=`"${fd(v.date)}","${vh.immat||'—'}","${cd.prenom||''} ${cd.nom||''}","${v.montant}","${v.statut}","${(v.note||'').replace(/"/g,"'")}"\n`;}
  }else{
    csv+='Date,Categorie,Vehicule,Montant,Note\n';
    for(const d of data){const vh=getVeh(d.veh_id)||{};
      csv+=`"${fd(d.date)}","${d.categorie||'—'}","${vh.immat||'—'}","${d.montant}","${(d.note||'').replace(/"/g,"'")}"\n`;}
  }
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`samaflotte_${curRapTab}_${new Date().toISOString().split('T')[0]}.csv`;a.click();
  log('Export CSV',curRapTab);
}

function expPDF(){
  const data=getRapData();
  let txt=`SAMA FLOTTE 2.0 — Rapport ${curRapTab}\nGénéré le: ${new Date().toLocaleString('fr-FR')}\n`;
  txt+=`Nombre d'enregistrements: ${data.length}\n\n`;
  if(curRapTab==='versements'){
    const tot=data.filter(d=>d.statut==='valide').reduce((s,d)=>s+(d.montant||0),0);
    txt+=`TOTAL VALIDÉ: ${fm(tot)}\n\n`;
    txt+='DATE | VEHICULE | CONDUCTEUR | MONTANT | STATUT\n';
    txt+='---------------------------------------------------\n';
    for(const v of data){const vh=getVeh(v.veh_id)||{};const cd=getCond(v.cond_id)||{};
      txt+=`${fd(v.date)} | ${vh.immat||'—'} | ${cd.prenom||''} ${cd.nom||''} | ${fm(v.montant)} | ${v.statut}\n`;}
  }else{
    const tot=data.reduce((s,d)=>s+(d.montant||0),0);
    txt+=`TOTAL DÉPENSES: ${fm(tot)}\n\n`;
    txt+='DATE | CATEGORIE | VEHICULE | MONTANT\n';txt+='------------------------------------------\n';
    for(const d of data){const vh=getVeh(d.veh_id)||{};
      txt+=`${fd(d.date)} | ${d.categorie||'—'} | ${vh.immat||'—'} | ${fm(d.montant)}\n`;}
  }
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`samaflotte_${curRapTab}_${new Date().toISOString().split('T')[0]}.txt`;a.click();
  log('Export rapport',curRapTab);
}

function onRoleChange(){

function saveUser(){
  const prenom=gv('nu-prenom'),nom=gv('nu-nom'),email=gv('nu-email'),role=gv('nu-role'),pwd=gvr('nu-pwd'),pwd2=gvr('nu-pwd2');
  const err=$('nu-err');err.style.display='none';
  if(!prenom||!nom||!email||!pwd){err.textContent='Champs obligatoires manquants';err.style.display='block';return;}
  if(pwd!==pwd2){err.textContent='Mots de passe différents';err.style.display='block';return;}
  if(pwd.length<8){err.textContent='Mot de passe trop court (min 8)';err.style.display='block';return;}
  const users=DB.g('users')||[];
  if(users.find(u=>u.email.toLowerCase()===email.toLowerCase())){err.textContent='Email déjà utilisé';err.style.display='block';return;}
  const nid=uid();
  users.push({id:nid,nom,prenom,email,pwd:hpwd(pwd),role,actif:true,created:now()});
  DB.s('users',users);
  if(role==='employe'){
    const pid=gv('nu-prop');
    const emps=DB.g('employes')||[];
    emps.push({id:uid(),utilisateur_id:nid,prop_id:pid,permissions:{
      versements:$('pv')?.checked!==false,vehicules:$('pveh')?.checked!==false,
      conducteurs:$('pc')?.checked!==false,depenses:$('pd')?.checked!==false}});
    DB.s('employes',emps);
  }else if(role==='proprietaire'){
    const props=DB.g('proprietaires')||[];
    props.push({id:uid(),uid:nid,tel:'',adresse:'',created:now()});
    DB.s('proprietaires',props);
  }
  log('Création utilisateur',prenom+' '+nom+' ('+role+')');closeModal();renderUsers();
}

function savePerms(uid_){
  const emps=DB.g('employes')||[];let emp=emps.find(e=>e.utilisateur_id===uid_);
  if(!emp){emp={id:uid(),utilisateur_id:uid_};emps.push(emp);}
  emp.prop_id=gv('ep-prop');
  emp.permissions={versements:$('pp-v')?.checked!==false,vehicules:$('pp-veh')?.checked!==false,conducteurs:$('pp-c')?.checked!==false,depenses:$('pp-d')?.checked!==false};
  DB.s('employes',emps);log('Modif permissions','Employé');closeModal();renderUsers();
}

function resetPwd(uid_){
  const newPwd=prompt('Nouveau mot de passe (min 8 caractères) :');
  if(!newPwd) return;
  if(newPwd.length<8){alert('Trop court (min 8 caractères)');return;}
  const users=DB.g('users')||[];const u=users.find(x=>x.id===uid_);if(!u)return;
  u.pwd=hpwd(newPwd);DB.s('users',users);log('Réinit MDP',u.prenom+' '+u.nom);alert('Mot de passe réinitialisé ✓');
}

function toggleUser(uid_){
  const users=DB.g('users')||[];const u=users.find(x=>x.id===uid_);if(!u)return;
  u.actif=!u.actif;DB.s('users',users);log((u.actif?'Activation':'Suspension')+' compte',u.prenom+' '+u.nom);renderUsers();
}

function delUser(uid_){
  if(!confirm('Supprimer définitivement cet utilisateur ?'))return;
  const users=DB.g('users')||[];const i=users.findIndex(u=>u.id===uid_);if(i<0)return;
  const name=users[i].prenom+' '+users[i].nom;const role=users[i].role;
  users.splice(i,1);DB.s('users',users);
  if(role==='proprietaire'){const props=DB.g('proprietaires')||[];DB.s('proprietaires',props.filter(p=>p.uid!==uid_));}
  if(role==='employe'){const emps=DB.g('employes')||[];DB.s('employes',emps.filter(e=>e.utilisateur_id!==uid_));}
  log('Suppression utilisateur',name);renderUsers();
}

function renderActivity(){
  const acts=DB.g('activity')||[];
  let html=`<div class="pg-hdr"><div><div class="pg-title">Journal d'activité</div><div class="pg-sub">${acts.length} action(s)</div></div></div>
  <div class="tw"><table><thead><tr><th>Date/Heure</th><th>Utilisateur</th><th>Action</th><th>Détail</th></tr></thead><tbody>`;
  if(!acts.length) html+='<tr><td colspan="4"><div class="empty-st" style="padding:40px"><h3>Aucune activité</h3></div></td></tr>';
  for(const a of acts){
    const u=getUser(a.uid)||{nom:'—',prenom:''};
    html+=`<tr>
      <td style="font-family:var(--mono);font-size:10px;white-space:nowrap">${fdt(a.ts)}</td>
      <td><div style="display:flex;align-items:center;gap:6px">${av(u.nom,u.prenom,avc(u.email||u.id),'sm')}<span style="font-size:12px">${u.prenom} ${u.nom}</span></div></td>
      <td><span class="b b-bl" style="font-size:10px">${a.action}</span></td>
      <td style="font-size:11px;color:var(--text3)">${a.detail||'—'}</td>
    </tr>`;
  }
  html+='</tbody></table></div>';
  $('content').innerHTML=html;
}

  let html=`<div class="pg-hdr"><div><div class="pg-title">Mon profil</div><div class="pg-sub">Gérez votre compte</div></div></div>

        <div class="fgrp"><label>Confirmer</label><input type="password" id="pwd-new2" placeholder="Répéter"/></div>
        <div id="pwd-err" class="err-msg"></div>

    </div>

  <div class="tw" style="margin-top:14px">
    <div class="tw-hdr"><div class="tw-title">📊 Informations du compte</div></div>
    <div style="padding:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">
      <div><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Rôle</div><div style="font-size:14px;font-weight:800;margin-top:4px">${{superadmin:'Super Admin',proprietaire:'Propriétaire',employe:'Employé'}[u.role]||u.role}</div></div>
      <div><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Créé le</div><div style="font-size:14px;font-weight:700;margin-top:4px">${fd(u.created)}</div></div>
      <div><div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase">Statut</div><div style="margin-top:6px"><span class="b b-gr">Actif</span></div></div>
    </div>
  </div>`;
  $('content').innerHTML=html;

async function updateProfilePhoto(input){
  if(!input.files[0])return;
  if(input.files[0].size>3*1024*1024){alert('Image trop lourde (max 3Mo)');return;}
  const data=await readFileAsDataURL(input.files[0]);
  const prev=$('prof-av-prev');
  prev.innerHTML=`<img src="${data}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  const users=DB.g('users')||[];const u=users.find(x=>x.id===CU.id);if(!u)return;
  u.logo=data;DB.s('users',users);CU=u;refreshUser();
}

function saveProfil(){
  const users=DB.g('users')||[];const u=users.find(x=>x.id===CU.id);if(!u)return;
  u.prenom=gv('prof-prenom');u.nom=gv('prof-nom');u.email=gv('prof-email');u.tel=gv('prof-tel');
  DB.s('users',users);CU=u;refreshUser();log('Modif profil',u.prenom+' '+u.nom);
  const ok=$('prof-ok');ok.style.display='flex';setTimeout(()=>ok.style.display='none',3000);
}

function savePwd(){
  const cur=gvr('pwd-cur'),nw=gvr('pwd-new'),nw2=gvr('pwd-new2');
  const err=$('pwd-err');err.style.display='none';
  if(!cpwd(cur,CU.pwd)){err.textContent='Mot de passe actuel incorrect';err.style.display='block';return;}
  if(nw!==nw2){err.textContent='Les nouveaux mots de passe ne correspondent pas';err.style.display='block';return;}
  if(nw.length<8){err.textContent='Trop court (min 8 caractères)';err.style.display='block';return;}
  const users=DB.g('users')||[];const u=users.find(x=>x.id===CU.id);
  u.pwd=hpwd(nw);DB.s('users',users);CU=u;log('Changement MDP','—');
  const ok=$('pwd-ok');ok.style.display='flex';setTimeout(()=>ok.style.display='none',3000);
  $('pwd-cur').value='';$('pwd-new').value='';$('pwd-new2').value='';
}
